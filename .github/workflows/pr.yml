name: pr

on:
  pull_request:
  push:
    branches: [main]

# Default to read-only; each job escalates only where it needs to.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt --break-system-packages

      - name: Run ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt --break-system-packages

      - name: Run pytest
        run: pytest -v

  sast-semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    permissions:
      contents: read
      security-events: write  # required to upload SARIF to the Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/python \
            --config p/secrets \
            --sarif --output semgrep.sarif \
            --error \
            .
        continue-on-error: true  # let the SARIF upload happen even if findings exist;
                                  # severity gating happens via the Security tab, not build failure, for now

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  sast-codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql

  sca-trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem / dependency scan)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy-sca

  secrets-gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history, not just the latest commit
      - name: Run gitleaks
        uses: docker://zricethezav/gitleaks:latest
        with:
          args: detect --source . --verbose --exit-code 1
        # Runs gitleaks directly via its own image — no GitHub API calls,
        # no account-type lookup, so it can't fail the way gitleaks-action did.
        # Trade-off: no automatic PR comments on findings.